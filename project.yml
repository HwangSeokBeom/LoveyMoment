name: LoveyMoment
options:
  bundleIdPrefix: com.loveymoment
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  LoveyMoment:
    type: application
    platform: iOS
    sources:
      - path: LoveyMoment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loveymoment.poc
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lovey Moment
        INFOPLIST_KEY_NSHealthShareUsageDescription: Lovey Moment가 취침/기상 리듬을 추정해 캐릭터 Moment 알림 시간을 맞추기 위해 수면 분석 데이터를 읽습니다.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        CODE_SIGN_ENTITLEMENTS: LoveyMoment/LoveyMoment.entitlements
